name: Release

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - .github/workflows/release.yml

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      # Workaround: Node 22.22.2 のバンドル npm にモジュール欠損 (promise-retry) があり
      # 直接 npm install -g が失敗するため、npx 経由で正常な npm を取得してインストールする。
      # Node/npm の修正版がリリースされたらこのステップを削除して良い。
      - name: Upgrade npm for Trusted Publishing
        run: npx -y npm@10 install -g npm@10

      - run: npm ci
      - run: npm run build
      - run: npx vitest run --exclude 'vrt/**'

      - name: Create Release PR or Publish
        if: github.event_name == 'push'
        id: changesets
        uses: changesets/action@v1
        with:
          publish: npx changeset publish
          version: npx changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Sync package-lock.json on Release PR branch
        if: github.event_name == 'push' && steps.changesets.outputs.pullRequestNumber
        run: |
          git fetch origin changeset-release/main
          git checkout changeset-release/main
          npm install --package-lock-only
          if ! git diff --quiet -- package-lock.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add package-lock.json
            git commit -m "chore: sync package-lock.json"
            git push origin changeset-release/main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
