name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Knip
        run: npm run knip

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    strategy:
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test with coverage
        run: npx vitest run --coverage

      - name: Upload coverage report
        if: matrix.node-version == 22
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Cache main branch coverage
        if: matrix.node-version == 22 && github.event_name == 'push'
        uses: actions/cache/save@v4
        with:
          path: coverage/coverage-summary.json
          key: coverage-main-${{ github.sha }}

      - name: Restore main branch coverage
        id: restore-main-coverage
        if: matrix.node-version == 22 && github.event_name == 'pull_request'
        uses: actions/cache/restore@v4
        with:
          path: __main_coverage/coverage-summary.json
          key: coverage-main-
          restore-keys: coverage-main-

      - name: Coverage summary comment (with comparison)
        if: matrix.node-version == 22 && github.event_name == 'pull_request' && steps.restore-main-coverage.outputs.cache-matched-key != ''
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: coverage/coverage-summary.json
          json-summary-compare-path: __main_coverage/coverage-summary.json

      - name: Coverage summary comment (without comparison)
        if: matrix.node-version == 22 && github.event_name == 'pull_request' && steps.restore-main-coverage.outputs.cache-matched-key == ''
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: coverage/coverage-summary.json

      - name: Build
        run: npm run build

      - name: Verify package (CJS/ESM/TypeScript)
        run: bash scripts/test-package.sh

  vrt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull or build Docker image
        run: |
          git fetch origin main --depth=1
          if git diff --name-only origin/main -- docker/snapshot-vrt/ | grep -q .; then
            echo "docker/snapshot-vrt changed, forcing local build"
            docker build -t ghcr.io/hirokisakabe/pptx-glimpse-snapshot-vrt:latest docker/snapshot-vrt
          else
            docker pull ghcr.io/hirokisakabe/pptx-glimpse-snapshot-vrt:latest || \
              docker build -t ghcr.io/hirokisakabe/pptx-glimpse-snapshot-vrt:latest docker/snapshot-vrt
          fi

      - name: Generate VRT fixtures and run VRT
        run: |
          docker run --rm \
            -v "${{ github.workspace }}":/workspace \
            ghcr.io/hirokisakabe/pptx-glimpse-snapshot-vrt:latest \
            bash /workspace/vrt/snapshot/docker-run.sh \
            bash -c "npm run vrt:snapshot:fixtures && npx vitest run --config vitest.vrt.config.ts vrt/snapshot/regression.test.ts"

      - name: Upload diff images on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-vrt-diffs
          path: vrt/snapshot/diffs/
          retention-days: 7

  libreoffice-vrt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull or build Docker image
        run: |
          git fetch origin main --depth=1
          if git diff --name-only origin/main -- docker/libreoffice-vrt/ | grep -q .; then
            echo "docker/libreoffice-vrt changed, forcing local build"
            docker build -t ghcr.io/hirokisakabe/pptx-glimpse-vrt:latest docker/libreoffice-vrt
          else
            docker pull ghcr.io/hirokisakabe/pptx-glimpse-vrt:latest || \
              docker build -t ghcr.io/hirokisakabe/pptx-glimpse-vrt:latest docker/libreoffice-vrt
          fi

      - name: Generate fixtures
        run: docker run --rm -v "${{ github.workspace }}":/workspace ghcr.io/hirokisakabe/pptx-glimpse-vrt:latest python3 /workspace/vrt/libreoffice/create_fixtures.py

      - name: Generate LibreOffice reference images
        run: docker run --rm -v "${{ github.workspace }}":/workspace ghcr.io/hirokisakabe/pptx-glimpse-vrt:latest bash /workspace/vrt/libreoffice/update_snapshots.sh

      - name: Run LibreOffice VRT
        run: npx vitest run --config vitest.vrt.config.ts vrt/libreoffice/regression.test.ts

      - name: Upload diff images on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: libreoffice-vrt-diffs
          path: vrt/libreoffice/diffs/
          retention-days: 7
